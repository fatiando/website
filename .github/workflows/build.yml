# Build the website HTML and deploy it to GitHub Pages
name: build

# Only build PRs and the main branch
on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:

  ##################################################################################
  # Build the website
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The GitHub token is preserved by default but this job doesn't need
          # to be able to push to GitHub.
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Build the website
        run: make

      - name: Print a directory tree of the generated HTML for debugging
        run: tree -a _build

      # Push the HTML to the pages repository if this is a push to main and the
      # build was successful
      - name: Push to fatiando.github.io
        if: success() && github.event_name == 'push'
        # Don't use tags: https://julienrenaux.fr/2019/12/20/github-actions-security-risk/
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: fatiando/fatiando.github.io
          publish_branch: master
          publish_dir: ./_build
          # Only keep the latest commit to avoid bloating the repository
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
