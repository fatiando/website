- id: pooch
  title: "Pooch: Easily download datasets"
  status: stable
  doi: 10.21105/joss.01943
  code: |
    import pooch
    import xarray as xr

    # The Digital Object Identifier of the data
    doi = "10.6084/m9.figshare.13643837"
    # Known MD5 checksum (from figshare)
    checksum = "md5:16c94a792003714efee2bdb4f3181d3a"
    # Download the netCDF file and check integrity
    fname = pooch.retrieve(
        url=f"doi:{doi}/australia-ground-gravity.nc",
        known_hash=checksum,
    )
    # fname is the path to the file
    data = xr.load_dataset(fname)
  caption: |
    Running this code multiple times will only result in a single download because the data are cached automatically.
  description: |
    Pooch is the easiest way to <strong>download data files</strong> to your computer. It is used to manage sample data downloads not only by our own tools but also other popular Scientific Python libraries: <a href="https://github.com/scikit-image/scikit-image">scikit-image</a>, <a href="https://github.com/scipy/scipy">SciPy</a>, <a href="https://github.com/Unidata/MetPy">MetPy</a>, <a href="https://github.com/pydata/xarray">xarray</a>, <a href="https://github.com/SHTOOLS/SHTOOLS">SHTOOLS</a>, <a href="https://github.com/pytroll/satpy">satpy</a>, <a href="https://github.com/icepack/icepack">icepack</a>, <a href="https://github.com/histolab/histolab">histolab</a>, <a href="https://github.com/yt-project/yt">yt</a>, <a href="https://github.com/napari/napari">napari</a>, and <a href="https://github.com/fatiando/pooch/network/dependents">more</a>.

- id: harmonica
  title: "Harmonica: All things potential fields"
  status: changing
  doi: 10.5281/zenodo.3628741
  img: images/harmonica-example-bushveld.png
  caption: |
    Residual gravity disturbances of the Bushveld Complex, South Africa, gridded to a uniform height with equivalent sources.
  description: |
    Harmonica is our library for processing, forward modeling, and inversion of <strong>gravity and magnetic</strong> data. Our goal is to incentivise good practices by <strong>carefully designing</strong> the software and offering <strong>state-of-the-art methods</strong> with efficient implementations.

