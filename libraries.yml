- id: choclo
  title: "Choclo: Kernel functions for geophysical models"
  status: changing
  doi: 10.5281/zenodo.7851747
  code: |
    import choclo

    # Define observation point
    easting, northing, upward = 10.4e3, -5.6e3, 110.
    # Define prism boundaries and physical properties
    prism = [4e3, 12e3, -10e3, -2e3, -300., 20.]
    magnetization = [1.2, -2.3, 1.0]
    # Compute magnetic field of the prism
    b_e, b_n, b_u = choclo.prism.magnetic_field(
        easting, northing, upward, *prism, *magnetization
    )
  caption: |
    This code for calculating the magnetic field generated by a prism can be put in a loop inside a <code>numba.jit</code> function to speed it up.
  description: |
    Optimized <a href="https://numba.pydata.org">numba</a>-compatible <strong>forward modelling</strong> functions for <strong>gravity</strong> and <strong>magnetic</strong> fields, specially tailored to be reused by other libraries, like Harmonica and Magali.
